  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

eight:1.45\">\"Nhưng mình không biết gì về trading — có làm được không?\"<\u002Fp>\n        <p style=\"margin:0; color:#8b949e; font-size:1rem; line-height:1.7; text-wrap:pretty\">Tôi hiểu câu hỏi này. Tôi cũng đã từng hỏi nó. Sự thật: bạn không bán trading, không tư vấn lệnh. Bạn phân phối nội dung đã được chuẩn bị sẵn — phần kiến thức thị trường đã có bộ phận chuyên môn lo. Việc của bạn là đăng đều và đúng góc. Phần lớn vendor giỏi nhất của tôi chưa từng đặt một lệnh nào.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:18px; padding:28px 0; border-bottom:1px solid #21262d\">\n      <div style=\"font-family:'Newsreader',Georgia,serif; color:rgba(240,185,11,0.45); font-size:3rem; line-height:0.7; font-weight:700; flex-shrink:0\">\"<\u002Fdiv>\n      <div>\n        <p style=\"margin:0 0 12px; color:#e6edf3; font-weight:600; font-size:1.08rem; line-height:1.45\">\"Nhưng mình đã thử global rồi — và thất bại rồi.\"<\u002Fp>\n        <p style=\"margin:0; color:#8b949e; font-size:1rem; line-height:1.7; text-wrap:pretty\">Vậy thì bạn đã đi trước phần lớn người khác. Bạn đã biết cảm giác thất bại — nghĩa là bạn đủ nghiêm túc để thử. Và vấn đề gần như chưa bao giờ là bạn. Nó là việc thiếu một trong ba trụ cột ở trên. Khi đủ cả ba, lần thử này sẽ khác.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:18px; padding:28px 0 0\">\n      <div style=\"font-family:'Newsreader',Georgia,serif; color:rgba(240,185,11,0.45); font-size:3rem; line-height:0.7; font-weight:700; flex-shrink:0\">\"<\u002Fdiv>\n      <div>\n        <p style=\"margin:0 0 12px; color:#e6edf3; font-weight:600; font-size:1.08rem; line-height:1.45\">\"Nhưng mình đang làm local — chuyển qua có mất hết không?\"<\u002Fp>\n        <p style=\"margin:0; color:#8b949e; font-size:1rem; line-height:1.7; text-wrap:pretty\">Không. Bạn không bỏ local. Bạn cộng thêm một nguồn commission tính bằng đô lên trên những gì đang làm. Cùng một công sức đăng bài, hai dòng thu nhập. Nhiều vendor chạy song song nhiều tháng trước khi quyết định nghiêng hẳn về bên nào.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- BLOCK 9 — PRODUCT INTRODUCTION -->\n<section style=\"background:#0d1117; padding:clamp(72px,10vw,110px) 0\">\n  <div data-reveal=\"\" style=\"max-width:760px; margin:0 auto; padding:0 clamp(20px,5vw,24px); text-align:center\">\n    <div style=\"font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace; color:#8b949e; font-size:0.8rem; letter-spacing:0.2em; text-transform:uppercase\">Hermes Vendor — Global Edition<\u002Fdiv>\n    <h2 style=\"margin:18px 0 0; font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace; color:#f0b90b; font-weight:700; font-size:clamp(1.6rem,3.6vw,2.3rem); line-height:1.28; letter-spacing:-0.01em; text-wrap:balance\">Hệ Thống 3 Bước Đưa Dân Affiliate Local Sang Global — Không Cần Làm Lại Từ Số 0<\u002Fh2>\n    <p style=\"margin:22px auto 0; max-width:560px; font-style:italic; color:#8b949e; font-size:1.05rem; line-height:1.75; text-wrap:pretty\">Content có sẵn mỗi ngày. Tracking minh bạch từng join. Và một người đã đi hết đoạn đường này đồng hành cùng bạn từng bước.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- BLOCK 10 — MODULE BREAKDOWN -->\n<section style=\"background:#161b22; padding:clamp(56px,8vw,84px) 0\">\n  <div data-reveal=\"\" style=\"max-width:760px; margin:0 auto; padding:0 clamp(20px,5vw,24px)\">\n    <div style=\"padding:0 0 32px; border-bottom:1px solid #21262d\">\n      <h3 style=\"margin:0 0 16px; font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace; color:#f0b90b; font-weight:700; font-size:1.2rem\">✦ Bước 1 — Content Infrastructure<\u002Fh3>\n      <p style=\"margin:0 0 14px; color:#8b949e; font-size:1.02rem; line-height:1.75; text-wrap:pretty\">Không có infrastructure này, bạn bắt đầu mỗi ngày bằng một màn hình trống và câu hỏi \"hôm nay đăng gì\". Đó là nơi 90% người bỏ cuộc — không phải vì khó, mà vì mệt.<\u002Fp>\n      <p style=\"margin:0 0 14px; color:#b6bfc9; font-size:1.02rem; line-height:1.75; text-wrap:pretty\">Hermes đưa bạn một Daily Content Pack: nội dung XAUUSD đúng nhịp thị trường, viết sẵn theo 6 góc tiếp cận khác nhau, kèm template để bạn cá nhân hoá trong vài phút. Bạn không nghĩ nội dung. Bạn chọn và đăng.<\u002Fp>\n      <!-- ASSET 5a: Screenshot Daily Content Pack. Swap: hermesSwapAsset('module-content', 'assets/...png') -->\n      <div class=\"asset-ph\" data-asset=\"module-content\" style=\"width:100%; max-width:680px; aspect-ratio:2/1; margin:4px 0 18px\"><span class=\"ph-ico\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#f0b90b\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><circle cx=\"8.5\" cy=\"8.5\" r=\"1.6\"><\u002Fcircle><path d=\"m21 15-4.5-4.5L5 21\"><\u002Fpath><\u002Fsvg><\u002Fspan><span class=\"ph-label\">Screenshot — Daily Content Pack<\u002Fspan><img alt=\"\" data-src=\"assets/module-content-pack.png\"><\u002Fdiv>\n      <p style=\"margin:0; font-style:italic; color:#f0b90b; font-size:0.98rem; line-height:1.6\">Sau bước này: bạn có nội dung cho 30 ngày tới, ngay hôm nay.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"padding:32px 0; border-bottom:1px solid #21262d\">\n      <h3 style=\"margin:0 0 16px; font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace; color:#f0b90b; font-weight:700; font-size:1.2rem\">✦ Bước 2 — Distribution Infrastructure<\u002Fh3>\n      <p style=\"margin:0 0 14px; color:#8b949e; font-size:1.02rem; line-height:1.75; text-wrap:pretty\">Viết hay mà không ai thấy thì cũng bằng không. Phần lớn người Việt mới ra global đăng theo bản năng — và thuật toán bóp ngay từ bài đầu.<\u002Fp>\n      <p style=\"margin:0 0 14px; color:#b6bfc9; font-size:1.02rem; line-height:1.75; text-wrap:pretty\">Hermes cho bạn khung phân phối đã được test trên X: đăng vào đúng nhịp, đúng định dạng, đúng cách thuật toán thưởng. Bạn nhận lịch le=\"width:64px; height:64px; border-radius:50%; background:#21262d; border:1px solid #30363d; display:flex; align-items:center; justify-content:center; color:#8b949e; font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace; font-size:1.2rem; filter:grayscale(1); overflow:hidden; flex-shrink:0\"><span class=\"ph-text\">H<\u002Fspan><img alt=\"\" data-src=\"assets/hiep-portrait.jpg\" style=\"display:none; width:100%; height:100%; object-fit:cover\"><\u002Fdiv>\n      <div>\n        <div style=\"color:#e6edf3; font-weight:600; font-size:1.05rem\">Hiệp<\u002Fdiv>\n        <div style=\"color:#8b949e; font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace; font-size:0.9rem\">@hiephoang47<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin:0 0 18px; color:#b6bfc9; font-size:1.05rem; line-height:1.85; text-wrap:pretty\">Vài năm trước, tôi ngồi nhìn dashboard Shopee affiliate của mình và thấy một đường thẳng đi xuống. Không phải đi ngang. Đi xuống. Tôi đã làm đủ thứ người ta bảo — đăng nhiều hơn, chạy theo mọi trend, hạ kỳ vọng của bản thân xuống thấp đến mức buồn cười. Càng cố, con số càng nhỏ.<\u002Fp>\n    <p style=\"margin:0 0 18px; color:#b6bfc9; font-size:1.05rem; line-height:1.85; text-wrap:pretty\">Vấn đề không phải tôi lười. Vấn đề là cả một thị trường local đang chia nhau một chiếc bánh ngày càng mỏng. Và tôi thì cứ tranh phần mỏng đó như thể đó là lựa chọn duy nhất.<\u002Fp>\n    <p style=\"margin:0 0 18px; color:#b6bfc9; font-size:1.05rem; line-height:1.85; text-wrap:pretty\">Lần đầu tôi thử global, tôi thất bại sạch. Không biết viết cho ai, không biết đăng kiểu gì, và đến phần thanh toán thì tắc — họ hỏi những thứ một người Việt bình thường không có. Tôi bỏ cuộc đúng một lần.<\u002Fp>\n    <p style=\"margin:0 0 18px; color:#b6bfc9; font-size:1.05rem; line-height:1.85; text-wrap:pretty\">Rồi tôi làm lại — nhưng lần này không cố \"làm nhiều hơn\". Tôi dừng lại và dựng hạ tầng: nội dung có hệ thống, phân phối có khung, thanh toán có đường rõ ràng. Lần đó mọi thứ khác hẳn. Không phải vì tôi giỏi hơn. Vì tôi cuối cùng đã đứng trên ba trụ cột thay vì một.<\u002Fp>\n    <p style=\"margin:0; color:#e6edf3; font-size:1.05rem; line-height:1.85; text-wrap:pretty\">Hôm nay, Hermes là hệ thống tôi ước mình có từ ngày đầu. Tôi đóng gói đúng những gì đã đưa tôi qua — và đưa cho 127+ người đang đi cùng con đường.<\u002Fp>\n\n    <div style=\"margin-top:40px; display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px\">\n      <div style=\"background:#0d1117; border:1px solid #21262d; border-radius:12px; padding:24px\">\n        <h4 style=\"margin:0 0 18px; color:#e6edf3; font-weight:600; font-size:1rem\">Hệ thống này dành cho bạn nếu:<\u002Fh4>\n        <div style=\"display:flex; gap:10px; margin-bottom:13px; color:#b6bfc9; font-size:0.95rem; line-height:1.5\"><span style=\"color:#00a854; flex-shrink:0; font-weight:700\">✓<\u002Fspan><span>Bạn đã từng làm affiliate và sẵn sàng đăng đều<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; gap:10px; margin-bottom:13px; color:#b6bfc9; font-size:0.95rem; line-height:1.5\"><span style=\"color:#00a854; flex-shrink:0; font-weight:700\">✓<\u002Fspan><span>Bạn muốn thêm một dòng commission tính bằng đô<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; gap:10px; margin-bottom:13px; color:#b6bfc9; font-size:0.95rem; line-height:1.5\"><span style=\"color:#00a854; flex-shrink:0; font-weight:700\">✓<\u002Fspan><span>Bạn chấp nhận làm theo hệ thống thay vì tự mò<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; gap:10px; color:#b6bfc9; font-size:0.95rem; line-height:1.5\"><span style=\"color:#00a854; flex-shrink:0; font-weight:700\">✓<\u002Fspan><span>Bạn kiên nhẫn với compound effect, không cần giàu sau một đêm<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#0d1117; border:1px solid #21262d; border-radius:12px; padding:24px\">\n        <h4 style=\"margin:0 0 18px; color:#e6edf3; font-weight:600; font-size:1rem o; padding:0 clamp(20px,6vw,24px); text-align:center\">\n    <p style=\"margin:0 0 30px; font-family:'Newsreader',Georgia,serif; font-style:italic; color:#c0c8d0; font-size:clamp(1.15rem,2.6vw,1.4rem); line-height:1.7; text-wrap:pretty\">Để tôi hỏi bạn một điều.<\u002Fp>\n    <p style=\"margin:0 0 30px; font-family:'Newsreader',Georgia,serif; font-style:italic; color:#c0c8d0; font-size:clamp(1.15rem,2.6vw,1.4rem); line-height:1.7; text-wrap:pretty\">Hãy tưởng tượng ba tháng kể từ hôm nay.<\u002Fp>\n    <p style=\"margin:0 0 30px; font-family:'Newsreader',Georgia,serif; font-style:italic; color:#c0c8d0; font-size:clamp(1.15rem,2.6vw,1.4rem); line-height:1.7; text-wrap:pretty\">Sáng thứ Hai. Bạn mở app ngân hàng — không phải vì lo, mà vì tò mò. Có một khoản vừa chuyển vào. Đều như mọi tuần.<\u002Fp>\n    <p style=\"margin:0 0 30px; font-family:'Newsreader',Georgia,serif; font-style:italic; color:#c0c8d0; font-size:clamp(1.15rem,2.6vw,1.4rem); line-height:1.7; text-wrap:pretty\">Bạn không thức trắng đêm vì nó. Bạn không cày 12 tiếng vì nó. Tối qua bạn chỉ đăng một bài — như đã đăng suốt mấy tuần — rồi đi ngủ.<\u002Fp>\n    <p style=\"margin:0 0 30px; font-family:'Newsreader',Georgia,serif; font-style:italic; color:#c0c8d0; font-size:clamp(1.15rem,2.6vw,1.4rem); line-height:1.7; text-wrap:pretty\">Cái thay đổi không phải con số trong tài khoản. Là cách bạn nhìn chính mình. Bạn không còn là người đứng ngoài nhìn người khác khoe commission đô. Bạn là người đang sống điều đó.<\u002Fp>\n    <p style=\"margin:0 0 30px; font-family:'Newsreader',Georgia,serif; font-style:italic; color:#c0c8d0; font-size:clamp(1.15rem,2.6vw,1.4rem); line-height:1.7; text-wrap:pretty\">Đây không phải viễn cảnh xa vời. Đây là những gì 127 vendor của tôi đang sống mỗi tuần — bằng cùng đôi tay, cùng chiếc điện thoại bạn đang cầm lúc này.<\u002Fp>\n    <p style=\"margin:0 0 40px; font-family:'Newsreader',Georgia,serif; font-style:italic; color:#e6edf3; font-size:clamp(1.25rem,2.9vw,1.55rem); line-he indow) {\n        const io2 = new IntersectionObserver((entries) => {\n          entries.forEach(e => {\n            const hide = e.isIntersecting;\n            sticky.style.opacity = hide ? '0' : '1';\n            sticky.style.pointerEvents = hide ? 'none' : 'auto';\n          });\n        }, { threshold: 0.04 });\n        io2.observe(closing);\n      }\n    } catch (err) {\n      document.querySelectorAll('[data-reveal]').forEach(el => {\n        el.style.opacity = '1';\n        el.style.transform = 'none';\n      });\n    }\n  }\n\n  renderVals() {\n    const ctaUrl = this.props.ctaUrl ?? '#';\n    const slotsLeft = this.props.slotsLeft ?? 8;\n    const data = [\n      { question: 'Tôi thật sự không cần biết gì về trading?', answer: 'Đúng. Bạn phân phối nội dung đã được chuẩn bị, không tư vấn lệnh. Phần chuyên môn thị trường đã có bộ phận lo. Việc của bạn là đăng đều và đúng góc.' },\n      { question: 'Tôi cần bao nhiêu thời gian mỗi ngày?', answer: 'Phần lớn vendor dành 20–40 phút mỗi ngày sau khi quen hệ thống. Tuần đầu cần nhiều hơn một chút để dựng nền theo SOP 7 ngày.' },\n      { question: 'Commission về bằng cách nào? Tôi có cần ngân hàng nước ngoài không?', answer: 'Không. Quy trình thanh toán được thiết kế để hoạt động với người Việt. Hướng dẫn setup đi kèm chi tiết từng bước.' },\n      { question: 'Tôi đang làm local, có phải bỏ không?', answer: 'Không. Đây là dòng thu nhập cộng thêm. Nhiều vendor chạy song song local và global trong nhiều tháng.' },\n      { question: 'Bao lâu thì có join đầu tiên?', answer: 'Trung bình 3.2 ngày với người làm theo SOP. Không có gì đảm bảo tuyệt đối — nó phụ thuộc vào sự đều đặn của bạn.' },\n      { question: 'Chi phí tham gia là bao nhiêu?', answer: 'Không có phí tham gia, không cần vốn. Bạn \"trả\" bằng sự đều đặn khi đăng bài trong những tuần đầu.' },\n      { question: 'Nếu tôi thử rồi thấy không hợp?', answer: 'Bạn dừng bất cứ lúc nào, không ràng buộc. Cam kết 7 ngày đảm bảo ít nhất bài đầu của bạn được lên với sự hỗ trợ 1:1.' },\n      { question: 'Tại sao là XAUUSD mà không phải ngành khác?', answer: 'Vì nhu cầu nội dung vàng/forex ổn định, vòng đời dài, và có sẵn hạ tầng affiliate global trả commission đều. Nó hợp với chiến lược compound dài hạn.' }\n    ];\n    const faqs = data.map((f, i) => ({\n      question: f.question,\n      answer: f.answer,\n      isOpen: this.state.openFaq === i,\n      sign: this.state.openFaq === i ? '–' : '+',\n      toggle: () => this.toggleFaq(i)\n    }));\n    return { ctaUrl, slotsLeft, faqs };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
